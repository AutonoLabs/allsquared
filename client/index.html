<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1"
    />
    <link rel="icon" type="image/png" href="/logo-icon.png" />
    <link rel="apple-touch-icon" href="/logo-icon.png" />
    <title>%VITE_APP_TITLE% - Secure Service Contracts for UK Freelancers</title>

    <!-- Google Fonts: Plus Jakarta Sans (headings) + Inter (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Primary Meta Tags -->
    <meta name="title" content="AllSquared - Secure Service Contracts for UK Freelancers" />
    <meta name="description" content="The only platform combining AI contracts, FCA-backed escrow, and milestone management. Protect your payments, deliver with confidence." />
    <meta name="keywords" content="freelance contracts, service contracts, escrow, AI contracts, UK freelancers, payment protection, milestone management" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://allsquared.uk/" />
    <meta property="og:title" content="AllSquared - Secure Service Contracts for UK Freelancers" />
    <meta property="og:description" content="The only platform combining AI contracts, FCA-backed escrow, and milestone management. Protect your payments, deliver with confidence." />
    <meta property="og:image" content="/logo.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://allsquared.uk/" />
    <meta property="twitter:title" content="AllSquared - Secure Service Contracts for UK Freelancers" />
    <meta property="twitter:description" content="The only platform combining AI contracts, FCA-backed escrow, and milestone management. Protect your payments, deliver with confidence." />
    <meta property="twitter:image" content="/logo.png" />

    <!-- Additional Meta Tags -->
    <meta name="author" content="AllSquared" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://allsquared.uk/" />

    <style>
      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }
      h1, h2, h3, h4, h5, h6,
      .font-heading {
        font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
